# Copia come `docker-compose.override.yml` (file ignorato da Git).
# Docker Compose unisce automaticamente override + docker-compose.yml.
#
# Richiede l'immagine app costruita con `infra/docker/app/Dockerfile.xdebug`
# (copia da Dockerfile.xdebug.example → Dockerfile.xdebug, vedi .gitignore).

services:
  app:
    build:
      context: .
      dockerfile: infra/docker/app/Dockerfile.xdebug
      target: final
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-false}
      LOG_CHANNEL: ${LOG_CHANNEL:-stderr}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      XDEBUG_MODE: ${XDEBUG_MODE:-off}
      XDEBUG_START_WITH_REQUEST: ${XDEBUG_START_WITH_REQUEST:-trigger}
      XDEBUG_CONFIG: "client_host=host.docker.internal client_port=9003"

  db:
    ports:
      - "127.0.0.1:3316:3306"
