server {
    listen 80;
    index index.php index.html;
    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
    root /var/www/html/public;

    client_max_body_size 100M;

    # File pubblici caricati tramite Laravel public disk.
    # URL:  /storage/<path>
    # Path: storage/app/public/<path>
    # Evita dipendenza funzionale dal symlink public/storage.
    location ^~ /storage/ {
        alias /var/www/html/storage/app/public/;
        try_files $uri =404;

        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    # Ottimizzazione delivery media manipolati on-the-fly (Curator/Glide)
    location ^~ /curator/ {
        try_files $uri $uri/ /index.php?$query_string;

        # Offloading aggressivo lato client
        expires max;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
        gzip_static on;
    }
}
