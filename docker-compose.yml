# file: /opt/iartnet_backoffice/docker-compose.yml
name: iartnet_backoffice

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: iartnetcms_nginx
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "127.0.0.1:${CMS_HTTP_PORT:?Set CMS_HTTP_PORT}:80"
    volumes:
      - ./:/var/www/html:ro
      - ./infra/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - iartnet_net
      - cms_internal
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/up >/dev/null 2>&1 || wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 10s

  app:
    container_name: iartnetcms_app
    build:
      context: .
      dockerfile: infra/docker/app/Dockerfile
      target: final
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:?Set APP_ENV}
      APP_DEBUG: ${APP_DEBUG:?Set APP_DEBUG}
      LOG_CHANNEL: ${LOG_CHANNEL:-stderr}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-false}

      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:?Set DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME:?Set DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD}

      REDIS_CLIENT: ${REDIS_CLIENT:-phpredis}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-null}
      REDIS_PORT: ${REDIS_PORT:-6379}
    volumes:
      - ./storage:/var/www/html/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cms_internal
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "php -v >/dev/null 2>&1 && php artisan --version >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s

  db:
    image: mariadb:10.11
    container_name: iartnetcms_db
    ports:
      - "127.0.0.1:${DB_HOST_PORT:?Set DB_HOST_PORT}:3306"
    environment:
      MARIADB_DATABASE: ${DB_DATABASE:?Set DB_DATABASE}
      MARIADB_USER: ${DB_USERNAME:?Set DB_USERNAME}
      MARIADB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?Set DB_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - cms_internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -u root -p$${MARIADB_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: iartnetcms_redis
    command: ["redis-server", "--appendonly", "no"]
    networks:
      - cms_internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  iartnet_net:
    external: true
    name: iartnet_net

  cms_internal:
    internal: true

volumes:
  db_data:
    external: true
    name: ${DB_VOLUME_NAME:?Set DB_VOLUME_NAME}
